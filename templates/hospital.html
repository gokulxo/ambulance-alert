<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        #map { height: 450px; width: 100%; border-radius: 10px; margin-top: 15px; }
        .trip-card { border-left-color: #e53935 !important; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container wide">
        <h1>🏥 Hospital Dashboard</h1>
        <div id="alertBanner" class="alert-banner" style="display:none;">
            🚨 Incoming Emergencies
        </div>
        <div id="tripsList"><p style="color:#888;">Waiting for ambulance trips...</p></div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const HOSPITALS = [
            {lat: 13.0827, lng: 80.2707, name: "City General Hospital"},
            {lat: 13.0569, lng: 80.2091, name: "Apollo Hospital"},
            {lat: 13.0067, lng: 80.2206, name: "Fortis Malar Hospital"},
            {lat: 13.1143, lng: 80.2757, name: "Stanley Medical Hospital"}
        ];

        const map = L.map('map').setView([13.06, 80.24], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        HOSPITALS.forEach(h => {
            L.marker([h.lat, h.lng]).addTo(map).bindPopup('🏥 ' + h.name);
        });

        const ambulanceMarkers = {};
        let knownTripIds = new Set();

        function speak(text) {
            if (!window.speechSynthesis) return;
            const utter = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utter);
        }

        function fetchAllTrips() {
            fetch('/api/get_all_trips')
                .then(res => res.json())
                .then(data => {
                    const trips = data.trips || [];
                    const banner = document.getElementById('alertBanner');
                    const listDiv = document.getElementById('tripsList');

                    banner.style.display = trips.length > 0 ? 'block' : 'none';

                    if (trips.length === 0) {
                        listDiv.innerHTML = '<p style="color:#888;">Waiting for ambulance trips...</p>';
                    } else {
                        listDiv.innerHTML = trips.map(t => `
                            <div class="info-card trip-card">
                                <p><strong>🚑 Trip ${t.trip_id}</strong> - ${t.patient_name} (Age: ${t.age})</p>
                                <p>Condition: ${t.condition} | Status: ${t.status}</p>
                                <p>${t.nearest_hospital ? 'Nearest: ' + t.nearest_hospital.name : 'Locating...'}</p>
                            </div>
                        `).join('');
                    }

                    const activeIds = new Set(trips.map(t => t.trip_id));

                    Object.keys(ambulanceMarkers).forEach(id => {
                        if (!activeIds.has(id)) {
                            map.removeLayer(ambulanceMarkers[id]);
                            delete ambulanceMarkers[id];
                        }
                    });

                    trips.forEach(t => {
                        if (!knownTripIds.has(t.trip_id)) {
                            speak(`New emergency. Patient ${t.patient_name}, condition ${t.condition}.`);
                            knownTripIds.add(t.trip_id);
                        }

                        if (t.lat && t.lng) {
                            const pos = [t.lat, t.lng];
                            if (ambulanceMarkers[t.trip_id]) {
                                ambulanceMarkers[t.trip_id].setLatLng(pos);
                            } else {
                                ambulanceMarkers[t.trip_id] = L.marker(pos, {
                                    icon: L.icon({
                                        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
                                        iconSize: [28, 45], iconAnchor: [14, 45]
                                    })
                                }).addTo(map).bindPopup(`🚑 ${t.patient_name}`);
                            }
                        }
                    });

                    const validCoords = trips.filter(t => t.lat && t.lng).map(t => [t.lat, t.lng]);
                    if (validCoords.length > 0) {
                        map.fitBounds(validCoords, {padding: [50, 50], maxZoom: 12});
                    }
                });
        }

        setInterval(fetchAllTrips, 3000);
        fetchAllTrips();
    </script>
</body>
</html>
